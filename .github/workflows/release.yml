name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack and install pnpm
        run: corepack enable && corepack prepare --activate

      - uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version &>/dev/null; then
            echo "Skipping $NAME@$VERSION (already published)"
          else
            echo "Publishing $NAME@$VERSION..."
            PUBLISH_LOG=$(mktemp)
            if pnpm publish --access public --no-git-checks 2>&1 | tee "$PUBLISH_LOG"; then
              echo "Published $NAME@$VERSION"
            elif grep -Eqi '(EPUBLISHCONFLICT|E403|cannot publish over( the)? previously published versions|cannot modify pre-existing version)' "$PUBLISH_LOG"; then
              echo "Skipping $NAME@$VERSION (already published, confirmed by registry)"
            else
              echo "Failed to publish $NAME@$VERSION"
              cat "$PUBLISH_LOG"
              rm -f "$PUBLISH_LOG"
              exit 1
            fi
            rm -f "$PUBLISH_LOG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "GitHub Release '${{ github.ref_name }}' already exists. Skipping creation."
            exit 0
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
